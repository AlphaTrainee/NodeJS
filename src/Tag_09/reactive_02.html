<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <p>Der User {{ user.name }} ist {{ user.age }} Jahre alt</p>
        <button @click="birtthday">Geburtstag</button>
    </div>

    <script>
        const { createApp, reactive } = Vue;

        createApp({
            setup() {
                const user = reactive({
                    name: "bob",
                    age: 18
                });

                function birtthday() {
                    user.age++;
                };

                return { user, birtthday };
            }
        }).mount("#app");
    </script>
</body>
</html>
